name: quarterly-status

on:
  schedule:
    - cron: '15 6 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate quarterly status
