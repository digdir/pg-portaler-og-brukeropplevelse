          ORG_PAT: ${{ secrets.ORG_PAT }}
        with:
          github-token: ${{ secrets.ORG_PAT }}
          script: | 
            ... (jeg forkorter her for oversikt, men du får hele hvis du ønsker det i nytt svar)
